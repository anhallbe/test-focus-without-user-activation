<!DOCTYPE html>
<html lang="en">
  <head>
    <title>focus-without-user-activation</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
  </head>
  <body>
    <main>
      <button>Test</button>
      <p style="white-space: pre-wrap;"></p>
    </main>

    <script>
      const button = document.querySelector('button');
      const info = document.querySelector("p");

      function log(text) {
        console.log("[test-focus-without-user-activation]", text)
        info.textContent += `\n${text}`;
      }

      button.addEventListener("focus", () => {
        log("Button has focus");
      });
      button.addEventListener("blur", () => {
        log("Button lost focus");
      });
      button.addEventListener("click", () => {
        log("Button was clicked");
      });

      log("Will programmatically focus in 5 seconds...")
      setTimeout(() => {
        log("Focusing now")
        button.focus();
        setTimeout(() => {
          if (document.activeElement !== button) {
            log("Button was NOT focused.")
          }
        }, 5);
      }, 5000);
    </script>

    <style>
      button:focus {
        border: 1px solid red;
      }
    </style>
  </body>
</html>
